<h1>Typemaxxing — animal sprites</h1>
<div class="sub" id="sub">current draw code, rendered at 5× · idle0 / idle1 / walk1 / run2 / air</div>
<div id="root"></div>

<script>
// ============ EXACT PORT of src/three/Character.tsx draw code ============
const GW = 32, GH = 22;

function shade(hex, f) {
  const v = parseInt(hex.slice(1), 16);
  const r = Math.min(255, Math.round(((v >> 16) & 255) * f));
  const g = Math.min(255, Math.round(((v >> 8) & 255) * f));
  const b = Math.min(255, Math.round((v & 255) * f));
  return "#" + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

// ---- quadruped skeleton (cat/fox/panda) ----
function quadLegs(px, P, bodyX, bodyW, bodyY, pi, near, far, foot, socks) {
  const groundY = 19, hipY = bodyY + 6, legLen = groundY - hipY;
  const backX = bodyX + 2, frontX = bodyX + bodyW - 4;
  let bn = 0, bf = 0, fn = 0, ff = 0, lift = 0;
  if (pi.run) {
    const ph = [[1,2,-1,-2,1],[-3,-4,3,4,2],[-1,0,1,2,0],[2,1,-2,-1,0]];
    [bn, bf, fn, ff, lift] = ph[pi.frame];
  } else if (pi.air) { bn=-3; bf=-4; fn=3; ff=4; lift=2; }
  else { const sw=[2,0,-2,0][pi.frame]; bn=sw; bf=-sw; fn=-sw; ff=sw; }
  const leg = (x, dx, color) => {
    const len = Math.max(2, legLen - lift);
    px(color, x + dx*0.99, hipY, 2, len);
    if (socks) px(P.pat, x + dx*0.99, hipY + len - 2, 2, 2);
    else px(foot, x + dx*0.99, hipY + len - 1, 2, 1);
  };
  leg(backX, bf, far); leg(frontX, ff, far); leg(backX, bn, near); leg(frontX, fn, near);
}

function drawQuad(px, clr, P, pi, o) {
  const ears = (hx, hy) => {
    if (o.ear === "round") {
      px(o.earColor, hx-1, hy-2, 3, 3); clr(hx-1, hy-2); clr(hx+1, hy-2);
      px(o.earColor, hx+6, hy-2, 3, 3); clr(hx+6, hy-2); clr(hx+8, hy-2);
      px(P.pink, hx, hy-1, 1, 1); px(P.pink, hx+7, hy-1, 1, 1);
    } else if (o.ear === "fox") {
      px(o.earColor, hx, hy-2, 2, 3); px(o.earColor, hx+7, hy-2, 2, 3);
      if (o.earTip) { px(o.earTip, hx, hy-2, 2, 1); px(o.earTip, hx+7, hy-2, 2, 1); }
      px(P.pink, hx+1, hy, 1, 1); px(P.pink, hx+8, hy, 1, 1);
    } else {
      px(o.earColor, hx, hy-1, 2, 2); px(o.earColor, hx+7, hy-1, 2, 2);
      px(P.pink, hx+1, hy-1, 1, 1); px(P.pink, hx+8, hy-1, 1, 1);
    }
  };
  if (pi.idle) {
    const flick = pi.frame === 1;
    px(P.fur, 9, 9, 10, 9); clr(9,9); clr(18,9);
    px(P.fur, 11, 6, 8, 4);
    px(P.dark, 9, 16, 10, 2);
    px(P.belly, 15, 10, 4, 7);
    px(P.fur, 15, 1, 9, 7); clr(15,1); clr(23,1); clr(15,7); clr(23,7);
    ears(15, 1);
    if (o.muzzle) px(P.belly, 21, 4, 3, 3);
    px(P.ink, 21, 3, 1, 2);
    px(P.pink, 23, 5, 1, 1);
    px(P.pink, 20, 6, 1, 1);
    px(P.belly, 24, 4, 1, 1); px(P.belly, 24, 6, 1, 1);
    px(o.leg, 16, 12, 2, 7);
    px(o.socks ? P.pat : o.foot, 16, 17, 2, 2);
    if (o.tail === "bushy") { px(P.fur, 3, 12, 5, 7); clr(3,12); clr(7,12); px(o.tailTip ?? P.belly, 3, 11, 4, 2); }
    else if (o.tail === "stub") { px(o.leg, 7, 15, 3, 3); }
    else { px(P.dark, 6, 17, 10, 2); px(P.dark, 5, 15-(flick?2:0), 2, 3+(flick?2:0)); px(P.belly, 5, 13-(flick?2:0), 2, 2); }
    return;
  }
  const stretch = pi.run || pi.air;
  const bob = pi.run ? [0,-2,-1,0][pi.frame] : [0,-1,0,-1][pi.frame];
  const bodyY = 8 + bob;
  const bodyX = stretch ? 5 : 7;
  const bodyW = stretch ? 19 : 15;
  if (o.tail === "bushy") {
    if (stretch) { px(P.fur, bodyX-6, bodyY-2, 6, 5); px(o.tailTip ?? P.belly, bodyX-7, bodyY-2, 2, 3); }
    else { px(P.fur, 1, bodyY-3, 4, 7); px(o.tailTip ?? P.belly, 1, bodyY-4, 3, 2); }
  } else if (o.tail === "stub") { px(o.leg, bodyX-1, bodyY+3, 2, 2); }
  else {
    if (stretch) { px(P.dark, bodyX-4, bodyY-1, 5, 2); px(P.belly, bodyX-5, bodyY-2, 2, 2); }
    else { px(P.dark, 3, bodyY-3, 2, 4); px(P.dark, 4, bodyY, 3, 2); px(P.belly, 3, bodyY-5, 2, 2); }
  }
  px(P.fur, bodyX, bodyY, bodyW, 7); clr(bodyX, bodyY); clr(bodyX+bodyW-1, bodyY);
  px(P.belly, bodyX+3, bodyY+5, bodyW-5, 2);
  const headX = stretch ? 22 : 20;
  const headY = bodyY - 5 + (pi.run ? 1 : 0);
  px(P.fur, headX, headY, 9, 8); clr(headX, headY); clr(headX+8, headY); clr(headX, headY+7); clr(headX+8, headY+7);
  ears(headX, headY);
  if (o.muzzle) px(P.belly, headX+4, headY+4, 4, 3);
  px(P.ink, headX+6, headY+3, 1, 2);
  px(P.pink, headX+8, headY+5, 1, 1);
  px(P.pink, headX+5, headY+6, 1, 1);
  px(P.belly, headX+9, headY+4, 1, 1); px(P.belly, headX+9, headY+6, 1, 1);
  quadLegs(px, P, bodyX, bodyW, bodyY, pi, o.leg, o.legDark, o.foot, !!o.socks);
}

const CUR = {};
CUR.cat = (px,clr,P,pi) => drawQuad(px,clr,P,pi,{ear:"cat",earColor:P.fur,tail:"thin",leg:P.fur,legDark:P.dark,foot:P.belly});
CUR.fox = (px,clr,P,pi) => drawQuad(px,clr,P,pi,{ear:"fox",earColor:P.fur,earTip:P.pat,tail:"bushy",tailTip:P.belly,leg:P.fur,legDark:P.dark,foot:P.belly,socks:true,muzzle:true});
CUR.panda = (px,clr,P,pi) => {
  const stretch = pi.run || pi.air;
  const bob = pi.run ? [0,-2,-1,0][pi.frame] : pi.idle ? (pi.frame?-1:0) : [0,-1,0,-1][pi.frame];
  const bodyY = 8 + bob;
  const bodyX = stretch ? 5 : 7;
  const bodyW = stretch ? 18 : 14;
  px(P.pat, bodyX-1, bodyY+2, 2, 2);
  px(P.fur, bodyX, bodyY, bodyW, 8);
  clr(bodyX,bodyY); clr(bodyX+bodyW-1,bodyY); clr(bodyX,bodyY+7); clr(bodyX+bodyW-1,bodyY+7);
  px(P.dark, bodyX+1, bodyY+7, bodyW-2, 1);
  const sw = 5;
  px(P.pat, bodyX+bodyW-sw, bodyY, sw, 7);
  clr(bodyX+bodyW-1, bodyY);
  const headX = stretch ? 21 : 19;
  const headY = bodyY - 5 + (pi.run ? 1 : 0);
  px(P.fur, headX, headY, 9, 8);
  clr(headX,headY); clr(headX+8,headY); clr(headX,headY+7); clr(headX+8,headY+7);
  px(P.pat, headX, headY-1, 3, 3); clr(headX, headY-1);
  px(P.pat, headX+6, headY-1, 3, 3); clr(headX+8, headY-1);
  px(P.pat, headX+3, headY+1, 4, 4); clr(headX+3, headY+1);
  px(P.belly, headX+5, headY+2, 1, 1); px(P.ink, headX+6, headY+2, 1, 1);
  px(P.pat, headX+7, headY+4, 2, 2); clr(headX+8, headY+5);
  px(P.pink, headX+6, headY+6, 1, 1);
  px(P.accent, headX+9, headY+2, 1, 4);
  px(P.accent, headX+8, headY+1, 2, 1);
  quadLegs(px, P, bodyX, bodyW, bodyY, pi, P.pat, shade(P.pat,0.82), P.pat, false);
};
CUR.bunny = (px,clr,P,pi) => {
  if (pi.idle) {
    px(P.fur, 10, 10, 10, 9); clr(10,10); clr(19,10); clr(10,18); clr(19,18);
    px(P.belly, 12, 13, 6, 4);
    px(P.belly, 8, 14, 3, 3);
    px(P.fur, 13, 4, 9, 8); clr(13,4); clr(21,4); clr(13,11); clr(21,11);
    px(P.fur, 15, -3, 2, 7); px(P.fur, 18, -3, 2, 7);
    px(P.pink, 15, -1, 1, 4); px(P.pink, 18, -1, 1, 4);
    px(P.ink, 19, 7, 1, 2);
    px(P.pink, 21, 9, 1, 1);
    px(P.belly, 20, 8, 2, 1);
    px(P.fur, 12, 17, 6, 2); px(P.belly, 12, 18, 6, 1);
    return;
  }
  const arc = pi.run ? [-1,-5,-8,-3][pi.frame] : pi.air ? -6 : [0,-3,-5,-2][pi.frame];
  const by = 9 + arc;
  px(P.fur, 7, by, 11, 8); clr(7,by); clr(17,by); clr(7,by+7); clr(17,by+7);
  px(P.belly, 9, by+4, 7, 3);
  px(P.belly, 5, by+2, 3, 3);
  px(P.fur, 16, by-2, 8, 7); clr(16,by-2); clr(23,by-2); clr(16,by+4); clr(23,by+4);
  const back = pi.air || pi.frame===1 || pi.frame===2;
  if (back) { px(P.fur, 13, by-4, 5, 2); px(P.fur, 11, by-5, 4, 2); px(P.pink, 13, by-4, 3, 1); }
  else { px(P.fur, 18, by-7, 2, 6); px(P.fur, 21, by-7, 2, 6); px(P.pink, 18, by-5, 1, 3); }
  px(P.ink, 22, by+1, 1, 2); px(P.pink, 24, by+3, 1, 1);
  const ext = pi.air || pi.frame===1 || pi.frame===2;
  if (ext) { px(P.fur, 5, by+5, 6, 2); px(P.belly, 5, by+6, 2, 1); }
  else { px(P.fur, 8, by+6, 3, 3); px(P.belly, 8, by+8, 3, 1); }
  px(P.fur, 17, by+6, 2, 2); px(P.belly, 17, by+7, 2, 1);
};
CUR.frog = (px,clr,P,pi) => {
  const lip = shade(P.fur, 0.55);
  if (pi.idle) {
    px(P.fur, 8, 12, 15, 6); clr(8,12); clr(22,12); clr(8,17); clr(22,17);
    px(P.belly, 11, 15, 9, 3);
    px(P.accent, 15, 14, 5, 1);
    px(P.fur, 15, 8, 3, 3); clr(15,8);
    px(P.fur, 19, 8, 3, 3); clr(21,8);
    px(P.belly, 16, 9, 2, 2); px(P.ink, 17, 9, 1, 1);
    px(P.belly, 20, 9, 2, 2); px(P.ink, 21, 9, 1, 1);
    px(lip, 11, 14, 12, 1);
    px(P.pat, 10, 13, 2, 2); px(P.pat, 15, 13, 2, 2);
    px(P.fur, 8, 16, 3, 3); px(P.fur, 20, 16, 3, 3);
    px(shade(P.fur,0.8), 9, 18, 3, 1); px(shade(P.fur,0.8), 20, 18, 3, 1);
    return;
  }
  const arc = pi.run ? [-1,-6,-9,-3][pi.frame] : pi.air ? -7 : [0,-4,-6,-2][pi.frame];
  const by = 11 + arc;
  px(P.fur, 7, by, 16, 6); clr(7,by); clr(22,by); clr(7,by+5); clr(22,by+5);
  px(P.belly, 10, by+3, 9, 2);
  px(P.fur, 17, by-2, 3, 3); clr(17,by-2);
  px(P.belly, 18, by-1, 2, 2); px(P.ink, 19, by-1, 1, 1);
  px(lip, 11, by+2, 12, 1);
  const ext = pi.air || pi.frame===1 || pi.frame===2;
  if (ext) { px(P.fur, 3, by+3, 7, 2); px(shade(P.fur,0.8), 3, by+4, 2, 1); }
  else { px(P.fur, 7, by+5, 3, 2); px(shade(P.fur,0.8), 7, by+6, 3, 1); }
  px(P.fur, 19, by+4, 2, 3); px(shade(P.fur,0.8), 19, by+6, 2, 1);
};
CUR.penguin = (px,clr,P,pi) => {
  if (pi.idle || pi.air) {
    px(P.fur, 11, 5, 10, 14); clr(11,5); clr(20,5); clr(11,18); clr(20,18);
    px(P.belly, 13, 8, 6, 10); clr(13,8); clr(18,8);
    px(P.fur, 12, 2, 9, 5); clr(12,2); clr(20,2);
    px(P.belly, 16, 4, 2, 2); px(P.ink, 17, 4, 1, 1); px(P.ink, 14, 4, 1, 1);
    px(P.accent, 19, 5, 3, 2); px(shade(P.accent,0.8), 19, 6, 3, 1);
    const up = pi.air ? -2 : 0;
    px(P.fur, 9, 8+up, 2, 7); px(P.fur, 21, 8+up, 2, 7);
    px(P.accent, 12, 19, 3, 2); px(P.accent, 16, 19, 3, 2);
    return;
  }
  const tilt = [0,1,0,-1][pi.frame];
  const by = 5 + (pi.run ? [0,-1,0,-1][pi.frame] : 0);
  const s = tilt;
  px(P.fur, 11+s, by, 10, 14); clr(11+s,by); clr(20+s,by); clr(11+s,by+13); clr(20+s,by+13);
  px(P.belly, 13+s, by+3, 6, 9); clr(13+s,by+3); clr(18+s,by+3);
  px(P.fur, 12+s, by-3, 9, 5); clr(12+s,by-3); clr(20+s,by-3);
  px(P.belly, 16+s, by-1, 2, 2); px(P.ink, 17+s, by-1, 1, 1); px(P.ink, 14+s, by-1, 1, 1);
  px(P.accent, 19+s, by, 3, 2);
  px(P.fur, 9+s, by+3+tilt, 2, 7); px(P.fur, 21+s, by+3-tilt, 2, 7);
  const fstep = [0,1,0,-1][pi.frame];
  px(P.accent, 12+fstep, 19, 3, 2); px(P.accent, 16-fstep, 19, 3, 2);
};

// NEW starts identical to CUR; per-animal improvements overwrite entries here.
const NEW = Object.assign({}, CUR);

// ---------- improved CAT: triangular ears, muzzle, tabby stripes, curled tail ----------
function catEars(px, clr, P, hx, hy) {
  // taller triangular ears (base 3 -> tip 1), pink inner, dark outline tip
  px(P.fur, hx, hy-2, 3, 3); clr(hx, hy-2); clr(hx+2, hy-2);            // left ear
  px(P.fur, hx+6, hy-2, 3, 3); clr(hx+6, hy-2); clr(hx+8, hy-2);       // right ear
  px(P.pink, hx+1, hy-1, 1, 1); px(P.pink, hx+7, hy-1, 1, 1);          // inner
}
NEW.cat = (px, clr, P, pi) => {
  const stripe = P.pat;
  if (pi.idle) {
    const flick = pi.frame === 1;
    // body
    px(P.fur, 9, 9, 10, 9); clr(9,9); clr(18,9);
    px(P.fur, 11, 6, 8, 4);
    px(P.dark, 9, 16, 10, 2);
    px(P.belly, 15, 10, 4, 7);
    // tabby stripes down the back
    px(stripe, 12, 6, 1, 3); px(stripe, 15, 6, 1, 3);
    // head (rounder)
    px(P.fur, 15, 1, 9, 7); clr(15,1); clr(23,1); clr(15,7); clr(23,7);
    catEars(px, clr, P, 15, 1);
    // muzzle + face
    px(P.belly, 21, 4, 3, 3);
    px(P.ink, 20, 3, 1, 2); px(P.ink, 23, 3, 1, 2);   // two eyes
    px(P.pink, 22, 4, 1, 1);                            // nose
    px(P.dark, 21, 5, 3, 1);                            // mouth line
    // front leg
    px(P.fur, 16, 12, 2, 5);
    px(P.belly, 16, 17, 2, 2);
    // curled-up tail with dark tip + a stripe
    px(P.fur, 6, 16, 3, 2);
    px(P.fur, 4, 12 - (flick?1:0), 2, 5);
    px(stripe, 4, 13, 2, 1);
    px(P.dark, 4, 11 - (flick?1:0), 2, 2);             // dark tip
    return;
  }
  const stretch = pi.run || pi.air;
  const bob = pi.run ? [0,-2,-1,0][pi.frame] : [0,-1,0,-1][pi.frame];
  const bodyY = 8 + bob;
  const bodyX = stretch ? 5 : 7;
  const bodyW = stretch ? 19 : 15;
  // tail: raised, curving up, dark tip
  if (stretch) { px(P.fur, bodyX-4, bodyY-2, 5, 2); px(P.fur, bodyX-5, bodyY-4, 2, 3); px(P.dark, bodyX-5, bodyY-5, 2, 2); }
  else { px(P.fur, 3, bodyY-1, 2, 4); px(P.fur, 2, bodyY-4, 2, 3); px(P.dark, 2, bodyY-5, 2, 2); }
  // body + belly
  px(P.fur, bodyX, bodyY, bodyW, 7); clr(bodyX, bodyY); clr(bodyX+bodyW-1, bodyY);
  px(P.belly, bodyX+3, bodyY+5, bodyW-5, 2);
  // tabby back-stripes
  px(stripe, bodyX+4, bodyY, 1, 3); px(stripe, bodyX+7, bodyY, 1, 3); px(stripe, bodyX+10, bodyY, 1, 3);
  // head
  const headX = stretch ? 22 : 20;
  const headY = bodyY - 5 + (pi.run ? 1 : 0);
  px(P.fur, headX, headY, 9, 8); clr(headX, headY); clr(headX+8, headY); clr(headX, headY+7); clr(headX+8, headY+7);
  catEars(px, clr, P, headX, headY);
  px(P.belly, headX+4, headY+4, 4, 3);               // muzzle
  px(P.ink, headX+6, headY+3, 1, 2);                 // eye
  px(P.pink, headX+7, headY+5, 1, 1);                // nose
  px(P.dark, headX+6, headY+6, 2, 1);                // mouth
  quadLegs(px, P, bodyX, bodyW, bodyY, pi, P.fur, P.dark, P.belly, false);
};

// ---------- improved FOX: pointed snout, black-tipped ears, bold bushy tail, socks ----------
function foxEars(px, clr, P, hx, hy) {
  px(P.fur, hx, hy-3, 2, 4); px(P.pat, hx, hy-3, 2, 1);        // left ear + dark tip
  px(P.fur, hx+7, hy-3, 2, 4); px(P.pat, hx+7, hy-3, 2, 1);   // right ear + dark tip
  px(P.pink, hx+1, hy-1, 1, 1); px(P.pink, hx+8, hy-1, 1, 1);
}
NEW.fox = (px, clr, P, pi) => {
  const white = P.belly;
  if (pi.idle) {
    px(P.fur, 9, 9, 10, 9); clr(9,9); clr(18,9);
    px(P.fur, 11, 6, 8, 4);
    px(P.dark, 9, 16, 10, 2);
    px(white, 14, 11, 4, 6);                                   // white chest
    px(P.fur, 15, 1, 9, 7); clr(15,1); clr(23,1); clr(15,7); clr(23,7);
    foxEars(px, clr, P, 15, 1);
    px(P.fur, 24, 4, 3, 3); px(white, 24, 6, 3, 1);           // pointed snout
    px(P.ink, 26, 5, 1, 1);                                    // nose tip
    px(P.ink, 20, 3, 1, 2); px(P.ink, 23, 3, 1, 2);           // eyes
    px(P.fur, 16, 12, 2, 5); px(P.pat, 16, 17, 2, 2);         // leg + black sock
    px(P.fur, 4, 10, 5, 8); clr(4,10); clr(8,10);            // bushy tail
    px(white, 4, 9, 4, 2);                                     // white tip
    return;
  }
  const stretch = pi.run || pi.air;
  const bob = pi.run ? [0,-2,-1,0][pi.frame] : [0,-1,0,-1][pi.frame];
  const bodyY = 8 + bob;
  const bodyX = stretch ? 5 : 7;
  const bodyW = stretch ? 19 : 15;
  if (stretch) { px(P.fur, bodyX-7, bodyY-2, 7, 6); clr(bodyX-7,bodyY-2); px(white, bodyX-8, bodyY-1, 2, 4); }
  else { px(P.fur, 0, bodyY-3, 5, 8); clr(0,bodyY-3); clr(4,bodyY-3); px(white, 0, bodyY-4, 3, 3); }
  px(P.fur, bodyX, bodyY, bodyW, 7); clr(bodyX, bodyY); clr(bodyX+bodyW-1, bodyY);
  px(white, bodyX+3, bodyY+5, bodyW-5, 2);
  const headX = stretch ? 22 : 20;
  const headY = bodyY - 5 + (pi.run ? 1 : 0);
  px(P.fur, headX, headY, 9, 8); clr(headX, headY); clr(headX+8, headY); clr(headX, headY+7); clr(headX+8, headY+7);
  foxEars(px, clr, P, headX, headY);
  px(P.fur, headX+8, headY+3, 3, 3); px(white, headX+8, headY+5, 3, 1);   // snout
  px(P.ink, headX+10, headY+4, 1, 1);                                     // nose
  px(P.ink, headX+6, headY+3, 1, 2);                                      // eye
  quadLegs(px, P, bodyX, bodyW, bodyY, pi, P.fur, P.dark, P.belly, true); // black socks
};

// ---------- improved BUNNY: pink nose + whiskers, rounder cotton tail, cleaner hops ----------
NEW.bunny = (px, clr, P, pi) => {
  if (pi.idle) {
    px(P.fur, 10, 10, 10, 9); clr(10,10); clr(19,10); clr(10,18); clr(19,18);
    px(P.belly, 12, 13, 6, 4);
    // round cotton tail
    px(P.belly, 7, 13, 4, 4); clr(7,13); clr(10,13); clr(7,16); clr(10,16);
    px(P.fur, 13, 4, 9, 8); clr(13,4); clr(21,4); clr(13,11); clr(21,11);
    // tall ears with pink inners
    px(P.fur, 15, -3, 2, 7); px(P.fur, 18, -3, 2, 7);
    px(P.pink, 15, -1, 1, 4); px(P.pink, 18, -1, 1, 4);
    // face: eye, pink nose, whiskers, cheek
    px(P.ink, 19, 7, 1, 2);
    px(P.pink, 21, 9, 1, 1);                    // nose
    px(P.dark, 22, 9, 2, 1);                    // whisker
    px(P.belly, 20, 8, 2, 1);                   // cheek
    px(P.fur, 12, 17, 6, 2); px(P.belly, 12, 18, 6, 1);   // big feet
    return;
  }
  const arc = pi.run ? [-1,-5,-8,-3][pi.frame] : pi.air ? -6 : [0,-3,-5,-2][pi.frame];
  const by = 9 + arc;
  // rounded body
  px(P.fur, 7, by, 11, 8); clr(7,by); clr(17,by); clr(7,by+7); clr(17,by+7);
  px(P.belly, 9, by+4, 7, 3);
  // bold round cotton tail
  px(P.belly, 4, by+2, 4, 4); clr(4,by+2); clr(7,by+2); clr(4,by+5); clr(7,by+5);
  px(P.fur, 16, by-2, 8, 7); clr(16,by-2); clr(23,by-2); clr(16,by+4); clr(23,by+4);
  const back = pi.air || pi.frame===1 || pi.frame===2;
  // ears: swept back mid-leap but still two clear ears; upright otherwise
  if (back) { px(P.fur, 12, by-4, 6, 2); px(P.fur, 10, by-5, 5, 2); px(P.pink, 12, by-4, 4, 1); }
  else { px(P.fur, 18, by-7, 2, 6); px(P.fur, 21, by-7, 2, 6); px(P.pink, 18, by-5, 1, 3); px(P.pink, 21, by-5, 1, 3); }
  px(P.ink, 22, by+1, 1, 2); px(P.pink, 24, by+3, 1, 1);   // eye + nose
  const ext = pi.air || pi.frame===1 || pi.frame===2;
  if (ext) { px(P.fur, 5, by+5, 6, 2); px(P.belly, 5, by+6, 2, 1); }
  else { px(P.fur, 8, by+6, 3, 3); px(P.belly, 8, by+8, 3, 1); }
  px(P.fur, 17, by+6, 3, 2); px(P.belly, 17, by+7, 3, 1);  // front foot
};

// ---------- improved PANDA: rounder body, bold round ears, clear eye patch + nose ----------
NEW.panda = (px, clr, P, pi) => {
  const stretch = pi.run || pi.air;
  const bob = pi.run ? [0,-2,-1,0][pi.frame] : pi.idle ? (pi.frame?-1:0) : [0,-1,0,-1][pi.frame];
  const bodyY = 8 + bob;
  const bodyX = stretch ? 5 : 7;
  const bodyW = stretch ? 18 : 15;
  px(P.pat, bodyX-1, bodyY+2, 2, 2);                          // stub tail
  // chubby rounded white body
  px(P.fur, bodyX, bodyY, bodyW, 9);
  clr(bodyX,bodyY); clr(bodyX+bodyW-1,bodyY); clr(bodyX,bodyY+8); clr(bodyX+bodyW-1,bodyY+8);
  clr(bodyX,bodyY+1); clr(bodyX+bodyW-1,bodyY+1);            // extra rounding
  // black shoulder band wrapping toward the front legs
  const sw = 5;
  px(P.pat, bodyX+bodyW-sw, bodyY+1, sw, 7);
  clr(bodyX+bodyW-1, bodyY+1);
  // head (round)
  const headX = stretch ? 21 : 19;
  const headY = bodyY - 5 + (pi.run ? 1 : 0);
  px(P.fur, headX, headY, 9, 8);
  clr(headX,headY); clr(headX+8,headY); clr(headX,headY+7); clr(headX+8,headY+7);
  // round black ears (trimmed to 3x3, tucked to the sides)
  px(P.pat, headX, headY-2, 3, 3); clr(headX,headY-2); clr(headX+2,headY-2);
  px(P.pat, headX+6, headY-2, 3, 3); clr(headX+6,headY-2); clr(headX+8,headY-2);
  // --- panda face: mostly white, small delicate marks ---
  // compact teardrop eye patch angling toward the nose (near eye)
  px(P.pat, headX+3, headY+2, 2, 2);
  px(P.pat, headX+4, headY+4, 1, 1);            // teardrop tail
  px(P.belly, headX+3, headY+2, 1, 1);          // white glint
  px(P.ink, headX+4, headY+2, 1, 1);            // tiny pupil
  // small round black nose at the snout, faint mouth
  px(P.pat, headX+7, headY+3, 1, 1);
  px(P.dark, headX+6, headY+5, 2, 1);
  quadLegs(px, P, bodyX, bodyW, bodyY, pi, P.pat, shade(P.pat,0.82), P.pat, false);
};

// ---------- improved FROG: two top eyes + bent hind legs + spots in the leap ----------
NEW.frog = (px, clr, P, pi) => {
  const lip = shade(P.fur, 0.55);
  const dk = shade(P.fur, 0.8);
  if (pi.idle) {
    const blink = pi.frame === 1;
    // big folded hind-leg haunch (near side) — knee up
    px(P.fur, 6, 13, 5, 4); clr(6,13); clr(10,13);
    px(dk, 6, 16, 5, 1);
    // rounded body (dome, not a box)
    px(P.fur, 9, 13, 13, 5); clr(9,13); clr(21,13); clr(9,17); clr(21,17);
    px(P.fur, 11, 11, 9, 3); clr(11,11); clr(19,11);      // rounded back/shoulders
    px(P.belly, 11, 15, 9, 3);                            // cream belly
    px(P.accent, 13, 15, 5, 1);                           // throat
    px(P.pat, 12, 12, 2, 1); px(P.pat, 16, 11, 2, 1);     // back spots
    // bulging eyes doming up off the top of the head
    px(P.fur, 15, 8, 3, 3); clr(15,8); clr(17,8);
    px(P.fur, 19, 8, 3, 3); clr(19,8); clr(21,8);
    if (blink) { px(lip, 16, 10, 2, 1); px(lip, 20, 10, 2, 1); }
    else { px(P.belly, 16, 9, 2, 1); px(P.ink, 16, 9, 1, 1); px(P.belly, 20, 9, 2, 1); px(P.ink, 20, 9, 1, 1); }
    // wide smiling mouth + upturned corner + nostril
    px(lip, 12, 14, 11, 1);
    px(lip, 22, 13, 1, 1);
    px(P.ink, 21, 12, 1, 1);
    // front hand planted forward, splayed toes
    px(P.fur, 20, 16, 3, 2);
    px(dk, 20, 18, 4, 1);
    // webbed hind foot forward
    px(P.fur, 8, 17, 3, 2);
    px(dk, 7, 18, 5, 1);
    return;
  }
  const arc = pi.run ? [-1,-6,-9,-3][pi.frame] : pi.air ? -7 : [0,-4,-6,-2][pi.frame];
  const by = 11 + arc;
  // wide streamlined body
  px(P.fur, 7, by, 16, 6); clr(7,by); clr(22,by); clr(7,by+5); clr(22,by+5);
  px(P.belly, 10, by+3, 10, 2);
  px(P.pat, 11, by+1, 2, 1); px(P.pat, 15, by, 2, 1);   // back spots
  // TWO eye bulges on top, toward the front
  px(P.fur, 16, by-2, 3, 2); clr(16,by-2);
  px(P.fur, 19, by-2, 3, 3); clr(21,by-2);
  px(P.belly, 17, by-1, 1, 1); px(P.ink, 18, by-1, 1, 1);
  px(P.belly, 20, by-1, 1, 1); px(P.ink, 21, by-1, 1, 1);
  px(lip, 11, by+2, 12, 1);                              // mouth
  // bent hind leg kicking back (thigh + shin), extended mid-leap
  const ext = pi.air || pi.frame===1 || pi.frame===2;
  if (ext) {
    px(P.fur, 3, by+1, 5, 2);                            // thigh back
    px(P.fur, 1, by+3, 3, 2);                            // shin down
    px(shade(P.fur,0.8), 1, by+4, 3, 1);                 // foot
  } else {
    px(P.fur, 5, by+3, 4, 3);                            // folded haunch
    px(shade(P.fur,0.8), 5, by+5, 3, 1);
  }
  // small front leg reaching forward
  px(P.fur, 18, by+4, 3, 2); px(shade(P.fur,0.8), 20, by+5, 2, 1);
};

// ---------- improved PENGUIN: egg body, pointed beak, white face, webbed feet ----------
NEW.penguin = (px, clr, P, pi) => {
  const foot = P.accent, beak = P.accent;
  if (pi.idle || pi.air) {
    // egg-shaped black body
    px(P.fur, 11, 4, 10, 15); clr(11,4); clr(20,4); clr(11,5); clr(20,5); clr(11,18); clr(20,18); clr(11,17); clr(20,17);
    // white belly oval
    px(P.belly, 13, 8, 6, 9); clr(13,8); clr(18,8); clr(13,16); clr(18,16);
    // white face patch framing the eyes
    px(P.belly, 14, 4, 5, 3); clr(14,4); clr(18,4);
    px(P.ink, 15, 5, 1, 1); px(P.ink, 17, 5, 1, 1);       // eyes
    // pointed orange beak
    px(beak, 19, 6, 2, 1); px(beak, 19, 7, 3, 1); px(shade(beak,0.8), 19, 7, 1, 1);
    // flippers held at the sides
    const up = pi.air ? -2 : 0;
    px(P.fur, 9, 9+up, 2, 6); px(P.fur, 21, 9+up, 2, 6);
    // webbed orange feet (splayed)
    px(foot, 11, 19, 4, 2); px(foot, 16, 19, 4, 2);
    px(shade(foot,0.82), 11, 20, 4, 1); px(shade(foot,0.82), 16, 20, 4, 1);
    return;
  }
  const tilt = [0,1,0,-1][pi.frame];
  const by = 4 + (pi.run ? [0,-1,0,-1][pi.frame] : 0);
  const s = tilt;
  px(P.fur, 11+s, by, 10, 15); clr(11+s,by); clr(20+s,by); clr(11+s,by+1); clr(20+s,by+1); clr(11+s,by+14); clr(20+s,by+14); clr(11+s,by+13); clr(20+s,by+13);
  px(P.belly, 13+s, by+4, 6, 9); clr(13+s,by+4); clr(18+s,by+4); clr(13+s,by+12); clr(18+s,by+12);
  px(P.belly, 14+s, by, 5, 3); clr(14+s,by); clr(18+s,by);
  px(P.ink, 15+s, by+1, 1, 1); px(P.ink, 17+s, by+1, 1, 1);
  px(beak, 19+s, by+2, 2, 1); px(beak, 19+s, by+3, 3, 1);
  px(P.fur, 9+s, by+4+tilt, 2, 6); px(P.fur, 21+s, by+4-tilt, 2, 6);
  const fstep = [0,1,0,-1][pi.frame];
  px(foot, 11+fstep, 19, 4, 2); px(foot, 16-fstep, 19, 4, 2);
};

// ============ palettes (from src/game/skins.ts) ============
const SKINS = [
  { id:"cat",     name:"Cat",     blurb:"the original climber",  fur:"#e0561e", accent:"#5ff0d0", belly:"#fff3e6", pat:"#a83c12" },
  { id:"fox",     name:"Fox",     blurb:"bushy tail, dark socks",fur:"#e8702a", accent:"#7db4ff", belly:"#fbe7d2", pat:"#3a2418" },
  { id:"bunny",   name:"Bunny",   blurb:"hops up the tower",     fur:"#eceef4", accent:"#ff9ec2", belly:"#ffffff", pat:"#d3aebb" },
  { id:"panda",   name:"Panda",   blurb:"roly-poly bamboo bud",  fur:"#f4f4f4", accent:"#8fd8b8", belly:"#ffffff", pat:"#20202a" },
  { id:"frog",    name:"Frog",    blurb:"leaps between steps",   fur:"#6cce49", accent:"#ffd23a", belly:"#e6f7c8", pat:"#3f8f2a" },
  { id:"penguin", name:"Penguin", blurb:"waddles ever upward",   fur:"#2b2f38", accent:"#ff8a2c", belly:"#f4f6fb", pat:"#12141a" },
];
function paletteFor(s){ return { fur:s.fur, dark:shade(s.fur,0.72), belly:s.belly, accent:s.accent, pat:s.pat, ink:"#22222e", pink:"#ff9ec2" }; }

const POSES = [
  { key:"idle0", label:"idle", pi:{idle:true,run:false,air:false,frame:0} },
  { key:"idle1", label:"idle·", pi:{idle:true,run:false,air:false,frame:1} },
  { key:"walk1", label:"walk", pi:{idle:false,run:false,air:false,frame:1} },
  { key:"run2",  label:"run",  pi:{idle:false,run:true,air:false,frame:2} },
  { key:"air",   label:"air",  pi:{idle:false,run:false,air:true,frame:0} },
];

const SCALE = Number(new URLSearchParams(location.search).get("scale")) || (new URLSearchParams(location.search).get("only") ? 9 : 5);
function renderSprite(drawFn, P, pi) {
  const c = document.createElement("canvas");
  c.width = GW * SCALE; c.height = GH * SCALE;
  const ctx = c.getContext("2d");
  ctx.imageSmoothingEnabled = false;
  const px = (color,x,y,w=1,h=1) => { ctx.fillStyle=color; ctx.fillRect(Math.round(x)*SCALE, Math.round(y)*SCALE, Math.round(w)*SCALE, Math.round(h)*SCALE); };
  const clr = (x,y,w=1,h=1) => { ctx.clearRect(Math.round(x)*SCALE, Math.round(y)*SCALE, Math.round(w)*SCALE, Math.round(h)*SCALE); };
  drawFn(px, clr, P, pi);
  return c;
}

// Which animals to show, and whether to render the AFTER column.
const params = new URLSearchParams(location.search);
const only = params.get("only");           // e.g. ?only=cat
const showAfter = params.get("after")==="1";

const root = document.getElementById("root");
const list = only ? SKINS.filter(s=>s.id===only) : SKINS;

if (showAfter) {
  const h = document.createElement("div"); h.className="col-h";
  h.innerHTML = '<span>BEFORE</span><span>AFTER</span>';
  // only meaningful when a single pose column set; we instead tag rows.
}

for (const s of list) {
  const P = paletteFor(s);
  const row = document.createElement("div"); row.className="row";
  const nm = document.createElement("div"); nm.className="name";
  nm.innerHTML = `<b>${s.name}</b><div class="blurb">${s.blurb}</div>`;
  row.appendChild(nm);

  const makeSet = (drawFn, tag) => {
    const wrap = document.createElement("div");
    const frames = document.createElement("div"); frames.className="frames";
    for (const pose of POSES) {
      const cell = document.createElement("div"); cell.className="cell";
      cell.appendChild(renderSprite(drawFn, P, pose.pi));
      const lab = document.createElement("span"); lab.textContent = pose.label;
      cell.appendChild(lab);
      frames.appendChild(cell);
    }
    if (tag) {
      const t = document.createElement("div"); t.className="grp";
      t.innerHTML = `<span class="tag ${tag==='BEFORE'?'before':'after'}">${tag}</span>`;
      wrap.appendChild(t);
    }
    wrap.appendChild(frames);
    return wrap;
  };

  if (showAfter) {
    const stack = document.createElement("div");
    stack.appendChild(makeSet(CUR[s.id], "BEFORE"));
    stack.appendChild(makeSet(NEW[s.id], "AFTER"));
    row.appendChild(stack);
  } else {
    row.appendChild(makeSet(CUR[s.id], null));
  }
  root.appendChild(row);
}
